<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempoQR - Temporal Knowledge Graph Question Answering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .prediction-card {
            transition: all 0.3s ease;
        }
        .prediction-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-5xl font-bold text-white mb-4">
                <i class="fas fa-brain mr-3"></i>TempoQR
            </h1>
            <p class="text-xl text-white/90 mb-2">Temporal Knowledge Graph Question Answering</p>
            <div class="flex justify-center items-center space-x-4 text-white/80">
                <span><i class="fas fa-server mr-2"></i>API Status: <span id="apiStatus" class="font-semibold">Loading...</span></span>
                <span><i class="fas fa-microchip mr-2"></i>Device: <span id="deviceInfo" class="font-semibold">-</span></span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="grid lg:grid-cols-2 gap-8">
            <!-- Query Section -->
            <section class="glass-effect rounded-2xl p-8 shadow-2xl">
                <h2 class="text-2xl font-bold text-white mb-6">
                    <i class="fas fa-question-circle mr-3"></i>Đặt câu hỏi
                </h2>
                
                <form id="queryForm" class="space-y-6">
                    <div>
                        <label for="question" class="block text-white font-medium mb-2">Câu hỏi của bạn:</label>
                        <textarea 
                            id="question" 
                            rows="4" 
                            class="w-full px-4 py-3 rounded-lg bg-white/90 border border-white/20 focus:border-white/40 focus:outline-none focus:ring-2 focus:ring-white/50 transition-all"
                            placeholder="Nhập câu hỏi về Temporal Knowledge Graph..."
                            required
                        ></textarea>
                    </div>
                    
                    <div>
                        <label for="topK" class="block text-white font-medium mb-2">Số lượng kết quả:</label>
                        <select 
                            id="topK" 
                            class="w-full px-4 py-3 rounded-lg bg-white/90 border border-white/20 focus:border-white/40 focus:outline-none focus:ring-2 focus:ring-white/50 transition-all"
                        >
                            <option value="3">3 kết quả</option>
                            <option value="5" selected>5 kết quả</option>
                            <option value="10">10 kết quả</option>
                        </select>
                    </div>
                    
                    <button 
                        type="submit" 
                        id="submitBtn"
                        class="w-full bg-white text-purple-700 font-bold py-4 px-6 rounded-lg hover:bg-white/90 transform hover:scale-105 transition-all duration-200 shadow-lg"
                    >
                        <i class="fas fa-search mr-2"></i>Tìm kiếm
                    </button>
                </form>

                <!-- Loading State -->
                <div id="loadingState" class="hidden mt-6 text-center">
                    <div class="loading-spinner mx-auto mb-4"></div>
                    <p class="text-white">Đang xử lý câu hỏi...</p>
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="hidden mt-6 p-4 bg-red-500/20 border border-red-500/50 rounded-lg">
                    <p class="text-red-200"></p>
                </div>
            </section>

            <!-- Results Section -->
            <section id="resultsSection" class="glass-effect rounded-2xl p-8 shadow-2xl hidden">
                <h2 class="text-2xl font-bold text-white mb-6">
                    <i class="fas fa-list mr-3"></i>Kết quả tìm kiếm
                </h2>
                
                <!-- Processing Info -->
                <div class="mb-6 p-4 bg-white/10 rounded-lg">
                    <div class="flex justify-between items-center text-white/90">
                        <span><i class="fas fa-clock mr-2"></i>Thời gian xử lý: <span id="processingTime" class="font-mono font-semibold">0.00</span> giây</span>
                        <span><i class="fas fa-calendar mr-2"></i>Thời gian: <span id="timestamp" class="font-mono font-semibold">-</span></span>
                    </div>
                </div>

                <!-- Results Container -->
                <div id="resultsContainer" class="space-y-4">
                    <!-- Results will be inserted here -->
                </div>

                <!-- No Results Message -->
                <div id="noResults" class="hidden text-center py-8">
                    <i class="fas fa-search text-4xl text-white/50 mb-4"></i>
                    <p class="text-white/80 text-lg">Không tìm thấy kết quả cho câu hỏi này.</p>
                </div>
            </section>
        </main>

        <!-- Model Info Section -->
        <section id="modelInfoSection" class="glass-effect rounded-2xl p-8 shadow-2xl mt-8">
            <h2 class="text-2xl font-bold text-white mb-6">
                <i class="fas fa-info-circle mr-3"></i>Thông tin mô hình
            </h2>
            
            <div id="modelInfoContent" class="grid md:grid-cols-2 gap-6">
                <!-- Model info will be inserted here -->
            </div>
        </section>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api/v1';
        let isLoading = false;

        // DOM Elements
        const queryForm = document.getElementById('queryForm');
        const questionInput = document.getElementById('question');
        const topKSelect = document.getElementById('topK');
        const submitBtn = document.getElementById('submitBtn');
        const loadingState = document.getElementById('loadingState');
        const errorMessage = document.getElementById('errorMessage');
        const resultsSection = document.getElementById('resultsSection');
        const resultsContainer = document.getElementById('resultsContainer');
        const noResults = document.getElementById('noResults');
        const processingTime = document.getElementById('processingTime');
        const timestamp = document.getElementById('timestamp');
        const apiStatus = document.getElementById('apiStatus');
        const deviceInfo = document.getElementById('deviceInfo');
        const modelInfoContent = document.getElementById('modelInfoContent');

        // Initialize
        window.addEventListener('load', () => {
            checkApiHealth();
            loadModelInfo();
        });

        // Form submit
        queryForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            await submitQuestion();
        });

        // Check API Health
        async function checkApiHealth() {
            try {
                const response = await fetch(`${API_BASE_URL}/predict/health`);
                const data = await response.json();
                apiStatus.textContent = data.status || 'Unknown';
                apiStatus.className = data.status === 'healthy' ? 'text-green-400 font-semibold' : 'text-red-400 font-semibold';
                deviceInfo.textContent = data.device || '-';
            } catch (error) {
                apiStatus.textContent = 'Error';
                apiStatus.className = 'text-red-400 font-semibold';
            }
        }

        // Load Model Info
        async function loadModelInfo() {
            try {
                const response = await fetch(`${API_BASE_URL}/predict/model/info`);
                if (!response.ok) throw new Error('Failed to load model info');
                
                const data = await response.json();
                displayModelInfo(data);
            } catch (error) {
                console.error('Failed to load model info:', error);
                displayDefaultModelInfo();
            }
        }

        // Display Model Info
        function displayModelInfo(data) {
            modelInfoContent.innerHTML = `
                <div class="space-y-3">
                    <div class="text-white/90">
                        <span class="font-semibold text-white">Tên mô hình:</span>
                        <p class="text-lg">${data.model_name || 'N/A'}</p>
                    </div>
                    <div class="text-white/90">
                        <span class="font-semibold text-white">Dataset:</span>
                        <p class="text-lg">${data.dataset_name || 'N/A'}</p>
                    </div>
                </div>
                <div class="space-y-3">
                    <div class="text-white/90">
                        <span class="font-semibold text-white">Thực thể:</span>
                        <p class="text-lg">${data.num_entities || 'N/A'}</p>
                    </div>
                    <div class="text-white/90">
                        <span class="font-semibold text-white">Quan hệ:</span>
                        <p class="text-lg">${data.num_relations || 'N/A'}</p>
                    </div>
                    <div class="text-white/90">
                        <span class="font-semibold text-white">Timestamps:</span>
                        <p class="text-lg">${data.num_timestamps || 'N/A'}</p>
                    </div>
                    <div class="text-white/90">
                        <span class="font-semibold text-white">Device:</span>
                        <p class="text-lg">${data.device || 'N/A'}</p>
                    </div>
                </div>
            `;
        }

        // Display Default Model Info
        function displayDefaultModelInfo() {
            modelInfoContent.innerHTML = `
                <div class="text-center text-white/70 py-8">
                    <i class="fas fa-exclamation-triangle text-3xl mb-4"></i>
                    <p>Không thể tải thông tin mô hình</p>
                </div>
            `;
        }

        // Submit Question
        async function submitQuestion() {
            if (isLoading) return;
            
            const question = questionInput.value.trim();
            const topK = parseInt(topKSelect.value);
            
            if (!question) {
                showError('Vui lòng nhập câu hỏi');
                return;
            }

            showLoading();
            hideError();
            hideResults();

            try {
                const startTime = Date.now();
                
                const response = await fetch(`${API_BASE_URL}/predict/single`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: question,
                        top_k: topK
                    })
                });

                const endTime = Date.now();
                const processingTimeMs = ((endTime - startTime) / 1000).toFixed(2);

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Request failed');
                }

                const data = await response.json();
                console.log('API Response:', data);
                showResults(data, processingTimeMs);
                
            } catch (error) {
                showError(error.message);
            } finally {
                hideLoading();
            }
        }

        // Show Results
        function showResults(data, processingTimeMs) {
            console.log('showResults called with:', data, processingTimeMs);
            resultsContainer.innerHTML = '';
            
            if (data.predictions && data.predictions.length > 0) {
                console.log('Predictions found:', data.predictions);
                data.predictions.forEach((prediction, index) => {
                    const confidence = (prediction.confidence * 100).toFixed(1);
                    const card = createPredictionCard(index + 1, prediction.answer, confidence, prediction.answer_type);
                    resultsContainer.appendChild(card);
                });
                noResults.classList.add('hidden');
            } else {
                console.log('No predictions found');
                resultsContainer.innerHTML = '';
                noResults.classList.remove('hidden');
            }

            processingTime.textContent = processingTimeMs;
            timestamp.textContent = new Date().toLocaleString('vi-VN');
            resultsSection.classList.remove('hidden');
        }

        // Create Prediction Card
        function createPredictionCard(rank, answer, confidence, answerType) {
            const card = document.createElement('div');
            card.className = 'prediction-card bg-white/90 rounded-lg p-6 shadow-lg border border-white/20';
            
            const typeIcon = answerType === 'entity' ? 'fa-users' : 'fa-calendar';
            const typeColor = answerType === 'entity' ? 'text-blue-600' : 'text-green-600';
            
            card.innerHTML = `
                <div class="flex items-start space-x-4">
                    <div class="flex-shrink-0 w-10 h-10 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-full flex items-center justify-center font-bold text-lg">
                        ${rank}
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center space-x-2 mb-2">
                            <span class="${typeColor}">
                                <i class="fas ${typeIcon} mr-1"></i>
                                ${answerType || 'unknown'}
                            </span>
                            <span class="px-2 py-1 bg-gradient-to-r from-purple-500 to-pink-500 text-white text-xs rounded-full font-semibold">
                                ${confidence}%
                            </span>
                        </div>
                        <p class="text-gray-800 text-lg font-medium">${escapeHtml(answer)}</p>
                    </div>
                </div>
            `;
            
            return card;
        }

        // UI Helper Functions
        function showLoading() {
            isLoading = true;
            loadingState.classList.remove('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Đang xử lý...';
        }

        function hideLoading() {
            isLoading = false;
            loadingState.classList.add('hidden');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-search mr-2"></i>Tìm kiếm';
        }

        function showError(message) {
            errorMessage.querySelector('p').textContent = message;
            errorMessage.classList.remove('hidden');
        }

        function hideError() {
            errorMessage.classList.add('hidden');
        }

        function hideResults() {
            resultsSection.classList.add('hidden');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
